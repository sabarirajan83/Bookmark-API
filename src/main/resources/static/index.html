<!DOCTYPE html>
<html>
<head>
    <title>Bookmark Manager</title>

    <style>
        body {
            font-family: Arial;
            margin: 40px;
            background: #f5f5f5;
        }

        h2 {
            color: #333;
        }

        input, select, button {
            padding: 8px;
            margin: 5px;
        }

        button {
            cursor: pointer;
        }

        .card {
            background: white;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
        }

        .actions button {
            margin-right: 5px;
        }
    </style>
</head>

<body>

<h2>📌 Add Bookmark</h2>

<input id="title" placeholder="Title">
<input id="url" placeholder="URL">
<input id="category" placeholder="Category">

<button onclick="addBookmark()">Save</button>

<hr>

<h2>🔍 Filter by Category</h2>

<select id="filterCategory" onchange="filterBookmarks()"></select>

<hr>

<h2>📚 All Bookmarks</h2>

<div id="list"></div>

<script>
    const API = "http://localhost:8080/api/bookmarks";

    let allBookmarks = [];

    // CREATE
    function addBookmark() {
        fetch(API, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                title: title.value,
                url: url.value,
                category: category.value
            })
        })
            .then(() => {
                clearInputs();
                loadBookmarks();
            });
    }

    // READ
    function loadBookmarks() {
        fetch(API)
            .then(res => res.json())
            .then(data => {
                allBookmarks = data;
                displayBookmarks(data);
            });
    }

    // DISPLAY
    function displayBookmarks(data) {
        list.innerHTML = "";

        data.forEach(b => {
            list.innerHTML += `
            <div class="card">
                <b>${b.title}</b> (${b.category}) <br>
                <a href="${b.url}" target="_blank">${b.url}</a>

                <div class="actions">
                    <button onclick="editBookmark(${b.id}, '${b.title}', '${b.url}', '${b.category}')">Edit</button>
                    <button onclick="deleteBookmark(${b.id})">Delete</button>
                </div>
            </div>
        `;
        });
    }

    // UPDATE
    function editBookmark(id, oldTitle, oldUrl, oldCategory) {
        const newTitle = prompt("Edit Title", oldTitle);
        const newUrl = prompt("Edit URL", oldUrl);
        const newCategory = prompt("Edit Category (Video/Article/Repository)", oldCategory);

        fetch(API + "/" + id, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                title: newTitle,
                url: newUrl,
                category: newCategory
            })
        }).then(loadBookmarks);
    }

    // DELETE
    function deleteBookmark(id) {
        fetch(API + "/" + id, {
            method: "DELETE"
        }).then(loadBookmarks);
    }

    // FILTER
    function filterBookmarks() {
        const selected = filterCategory.value;

        if (selected === "All") {
            displayBookmarks(allBookmarks);
        } else {
            const filtered = allBookmarks.filter(b => b.category === selected);
            displayBookmarks(filtered);
        }
    }

    // CLEAR INPUTS
    function clearInputs() {
        title.value = "";
        url.value = "";
    }

    // LOAD ON START
    loadBookmarks();

</script>

</body>
</html>
